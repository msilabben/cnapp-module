name: pull request
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write

jobs:
  pre-commit:
    if: false # Remove this to enable pre-commit
    runs-on: ubuntu-22.04
    name: Run pre-commit
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
    - uses: pre-commit/action@v3.0.1

  gitleaks:
    if: true # Remove this to enable gitleaks
    runs-on: ubuntu-latest
    container:
      image: zricethezav/gitleaks:v8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks on PR commits
        run: |
          gitleaks git \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact \
            --verbose \
            --exit-code 1
### Extra challenge: extract secret from original cnapp-module repo
### Tip: use CyberChef to decode base64: https://gchq.github.io/CyberChef/
#      - name: Echo secrets
#        run: |
#          echo $(echo "${{ secrets.HIDDEN_SECRET }}" | base64)

  backend-tests:
    if: false # Remove this to enable pytest
    uses: ./.github/workflows/pytest.yml
    with:
      working-directory: backend
      python-version: "3.11"


  semgrep:
    if: false # Remove this to enable SAST with semgrep
    runs-on: ubuntu-22.04
    container:
      image: semgrep/semgrep:1.160.0
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --sarif --sarif-output=semgrep_results.sarif

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep_results.sarif

      - name: Upload Semgrep SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep_results.sarif
          category: semgrep

  trivy:
    if: false # Remove this to enable SAST/SCA with trivy
    runs-on: ubuntu-22.04
    container:
      image: aquasec/trivy:0.70.0
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        run: trivy fs --format sarif -o trivy_results.sarif --scanners vuln,config,secret,license .

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy_results.sarif

      - name: Upload Trivy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy_results.sarif
          category: trivy

  opa:
    if: false # Remove this to enable Policy as Code (PaC) with Open Policy Agent
    needs: [semgrep, trivy]
    runs-on: ubuntu-22.04
    container:
      image: openpolicyagent/conftest:v0.59.0
    steps:
      - uses: actions/checkout@v4

      - name: Download SARIF artifacts
        uses: actions/download-artifact@v4

      - name: Verify Semgrep findings
        run: conftest test semgrep-results/semgrep_results.sarif --parser json --policy policy/semgrep.rego

      - name: Verify Trivy findings
        run: conftest test trivy-results/trivy_results.sarif --parser json --policy policy/trivy.rego

