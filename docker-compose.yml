version: '3.9'

services:
  workspace:
    image: mcr.microsoft.com/devcontainers/python:1-3.11-bullseye
    volumes:
      - .:/workspaces/${localWorkspaceFolderBasename}:cached
    command: sleep infinity
    depends_on:
      - backend
      - frontend
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    container_name: fastapi-backend
    environment:
      - APP_ENV=development
    ports:
      - "8000:8000"
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    container_name: react-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
